body:
  text: 物理論天者旋也均也積陽為剛其體迴旋群生之所大仰北堂書鈔天部太平御覽天部楊雄非渾天而作蓋天圓其蓋左轉日月星辰隨而東西桓譚難之雄不解此蓋天者復難知也太平御覽天部元氣皓大則稱皓天皓天元氣也皓然而已無他物也太平御覽天部儒家立渾天以追天形从車輪焉周髀立天言天氣循邊而行從磨石焉斗極天之中也言天者必擬之人故自臍以下人之陰也自極以北天之陰也所以立天地者水也成天地者氣也水土之氣升而為天天者君也夫地有形而天無體譬如灰焉煙在上灰在下也渾天說天言天如車輪而日月旦從上過夜從下過故得出卯入酉或以斗極難之故作蓋天言天左轉日月不行皆緣邊為道就渾天之說則斗極不正若用蓋天則日月出入不定夫天元氣也皓然而已無他物焉太平御覽天部自極以南天之陽自極以北天之陰北堂書鈔天部北極天之中陽氣之北極也極南為太陽極北為太陰太陰則無光太陽則能照故為昏明寒暑之極也史記天官書索隱北堂書鈔天部日者太陽之精也夏則陽盛陰衰故晝長夜短冬則陰盛陽衰故晝短夜長氣之引也行陰陽之道長故出入卯酉之北行陰陽之道短故出入卯酉之南春秋陰陽等故日行中平晝夜等也太平御覽天部月水之精潮有大小月有虧盈北堂書鈔天部上弦月從下侵北堂書鈔天部日月之為星辰星辰辰生於地太平御覽天部京房說月與星至陰也有形無光日照之乃光如以影照日而有影見藝文類聚天部星者元氣之英也漢水之精也氣發而昇精華上浮宛轉隨流名之曰天河一曰雲漢眾星出焉詩小雅正義北堂書鈔天部太平御覽天部星元氣之精日精也二十八宿度數有數故謂恆星太平御覽天部斗極所以成寒暑北堂書鈔天部歲行一次謂之歲星則十二歲而星一周天也史記天官書索隱豈有太乙之君坐于庶人之座魁罡之神存于匹婦之室意林風者陰陽亂氣激發而起者也猶人之內氣因喜怒哀樂激越而發也故春氣溫其風溫以和喜風也夏氣盛其風熛以怒怒風也秋風勁其風清以直清風也冬氣其風慘以烈固風也此四正之風也又有四維之風東北明庶庶物出幽入明也東南融風以道以長也西南清和萬物備成也西北不周方潛藏也此八風者方土異氣疾徐不同和平則順違逆則凶非有使之者也氣積自然怒則飛沙揚礫發屋拔樹喜則不搖枝動草順物布氣天下之性自然之理也太平御覽天部事類賦天部注積風成雷北堂書鈔天部初學記天部藝文類聚天部太平御覽天部事類賦天部注風清熱之氣散為電北堂書鈔天部太平御覽天部軒轅主雷雨之神北堂書鈔天部雲雨于是乎出霜雪于是乎降北堂書鈔天部疇昔神農始治農功正節氣正寒溫以為早晚之期故立曆日藝文類聚歲時部事物紀原一正月朝四面黃氣其歲大豐此黃帝用事土氣均和四方並熟太平御覽歲時部陽盈而過故致旱藝文類聚災異部太平御覽咎徵部地者底也底之言著也陰體下著也爾雅釋文地者卦曰坤其德曰母其神曰祗亦曰媼大而名之曰黃地祗小而名之曰神州亦曰后土初學記地部太平御覽地部其神曰祗祗成也百生萬物備成也其卦為坤其德曰母地形有高下氣有剛柔物有巨細味有甘苦鎮之以五岳積之以邱陵播之以四瀆流之以四川蓋氣自然之體也地發黃泉周伏迴轉以生萬物地者天之根本也形西北高而東南下東西長南北短其盡四海者也北堂書鈔地理部太平御覽地部凡居地有大利而無小害者上地也初學記地理部太平御覽地部陸田者命懸于天人力雖修水旱不時則一年之功棄矣水田制之由人人力苟修則地利可盡意林游濁為土土氣合和而庶類自生太平御覽地部夫土地皆有形名而人莫察焉有龜龍體有麟鳳皃有弓弩勢有斗石象有張舒形有塞閉容有隱真之安有累卵之危有膏英之利有塉埆之害此四形者氣勢之始終陰陽之所極也初學記地理部事類賦地部注形有高下氣有剛柔北堂書鈔天部炎氣鬱蒸地之張也秋風蕩生地之閉也北堂書鈔天部定甯無不載廣厚無不容北堂書鈔天部士精為石藝文類聚地部石氣之核也氣之生石猶人筋絡之生爪牙也初學記地理部必得崑山之玉而後寶則荊璞無夜光之美必須南國之珠而後珍則隋侯無明月之稱意林所以立天地者水也夫水地之本也吐元氣發日月經星辰皆由水而興太平御覽地部九州之外皆水也余昔在會稽仰看南山見雲如瀑練方數丈其聲如硠礚須臾山下居民驚駭洪水大至太平御覽地部河色黃者眾川之流蓋濁之也百里一小曲千里一曲一直矣水經注河水太平御覽地部堯世洪水民登木而棲懸釜而爨太平御覽器物部九州變易交錯不同禹貢有梁州無并州周官有并州無梁州爾疋有營州無青州漢興武帝開拓三方立十三州通并梁之數而增交益焉太平御覽州郡部買宅者先卜鄰焉初學記居處部白帖太平御覽州郡部買鄰之直貴于買宅太平御覽州郡部故人之在孕者總其名籍上之天府天子立金匱玉閣命司錄以監省之太平御覽居處部夫齒者年也身之實也藏之斧鑿調諧五味以安性氣者太平御覽人事部咽喉者生之要孔太平御覽人事部腸胃五藏之府陶冶之大化也太平御覽人事部長人數丈身橫十畝四臂共骨老人生角男女變化何益於賢愚耶意林相者曰三亭九候定於一尺之面愚智勇怯形于一寸之目天倉金匱以別富貴貧賤意林人含氣而生精盡而死死猶澌也滅也譬如火焉薪盡而火滅則無光矣故滅火之餘無遺炎矣人死之後無遺魂矣初學記禮部太平御覽禮儀部人之涉世譬如奕棊苟不盡道誰無死地但不幸耳意林古者尊祭重神祭宗廟追養也祭天地報往也藝文類聚禮部三皇貴道而尚德帝先仁而後義王先義而後辭意林使民主養民如蠶母之養蠶則其用豈徒絲蠶而已哉太平御覽資產部語曰上不正下參差古者所以不欺其民也割剝富強以養貧弱何異餓耕牛乘馬而飽吠犬棄干將而礪鉛刃也意森天地成歲也先春而後秋人君之治也先禮而後刑意林姦與天地俱生自然之氣也人主以政禦人政寬則姦易禁政急則姦難絕文苑英華威行法明漏吞舟之魚法不明則類於細櫛細櫛則苛慝生也太平御覽服用部人之性如水焉置之圓則圓置之方則方澄之則渟而清動之則流而濁先王知中流之易擾亂故隨而教之謂其偏好者故立一定之法意林塞一蟻孔而河決息施一車轄而覆乘止立法令者亦宜舉要意林秉綱而目自張執本而末自從善賞者賞一善而天下之善皆勸善罰者罰一惡而天下之惡皆除矣意林止響以聲逐影以形姦爭流蕩不知所止也意林漢太宗除肉刑匹夫之仁也非天下之仁也不忍殘人之體而忍殺人故曰匹夫意林救嬰孩之疾而不忍鍼艾更加他物以至死也今除肉刑者更眾何異服他藥也肉刑雖斬其足猶能生育也張蒼除肉刑每歲所殺萬計鍾繇復肉刑歲生二千人也名肉刑者猶鳥獸登俎而作肉意林今有弱子當陷大辟問其慈父必乞以肉刑代之苟可以生易死也有道之君能不以此加百姓乎蛇螫在手壯夫斷其腕謂其雖斷不死也意林曹義曰縶馴駒以驂絆御悍馬以腐索今制民以輕刑亦如此也意林入粟補吏是賣官也罪人以贖是縱惡也意林夫有公心必有公道愛己者不能不愛憎己者不能不憎民富則安鄉重家敬上而從教貧則危鄉輕家相聚而犯上飢寒切身而不行非者寡矣意林妄進者若卵投石逃誅者若走赴深意林吏者理也所以理萬機平百揆也武士宰物猶使狼牧羊鷹養雛也是以人主務在審官擇人藝文類聚職官部太平御覽職官部羽族部世質則官少時文則吏多有虞氏官五十夏后氏官一百殷有二百周有三百意林國典之墜猶位喪也位之不建名理廢也意林高祖定天下置丞相以統文德立大司馬以統武事為二府焉藝文類聚職官部廣韻但知管子借耳于天下不知堯借人心而後用其耳目意林搆大廈者先擇匠而後簡材治國家者先擇佐而後定民意林在金石曰堅在草木曰緊在人曰賢千里一賢謂之比肩賢人為德體自然也故語曰黃金累千不如一賢藝文類聚人部太平御覽人事部夫清忠之士乃千人之表萬人之英得其人則事易于反手不得其人則難于拔筯太平御覽人事部龍舟整楫王良不能執也驥騄齊行越人不能御也各有所能意林伊尹耕于有莘孰知非夏之野人呂尚釣于渭濱孰知非殷之漁者遇湯武文王然後知其非也意林形之正不求影之直而影自直聲之平不求響之和而響自和德之崇不求名之遠而名自遠意林語曰士非玉璧談者為優藝文類聚寶玉部以譽取人則權勢移于下而朋黨之交用以功進士則有德者未必授而凡下之人或見任也君子內洗其心以虛受人外設法度立不易方今人稱古多賢患世無人退不三思坐語一世豈不惑耶意林公卿大夫刻石作碑鐫石作虎碑虎崇偽陳于三衢妨功喪德異端並起撞亡秦之鐘作鄭衛之樂欲以興治豈不難哉意林賞不避疏賤罰不避親貴貴有常名而賤不得冒尊有定位而卑不敢踰經之以道德緯之以仁義織之以禮法既成而後用之謂有孝廉秀才之貢或千里望風承聲而舉故任實者漸消積虛者日長意林夫欲定天下而任小人猶欲捕麋鹿而兔苴不可得也兔苴不能擊麋鹿猶小人不能任大事意林太平御覽資產部趙堯錐鑽之吏能探心致位丞相太平御覽器物部割地利己天下讎之推心及物天下歸之以信接人天下信之不以信接人妻子疑之見疑妻子難以事君君子修身居位非利名也在乎仁義意林人皆知滌其器莫知洗其心意林君子審其宗而後學明其道而後行或云玄衡以善詩至宰相張禹以善論作帝師豈非儒學之榮乎傅子曰學以道達榮不以位顯意林面歧路者有行迷之慮仰高山者有飛天之志或乘車馬而秦者所謂形異而實同也意林辨上下者莫正乎位興國家者莫貴乎人統內外者莫齊乎分宣德教者莫明乎學意林人之學如渴而飲河大飲則大盈小飲則小盈大觀則大見小觀則小見意林擬金人銘作口銘曰神以感通心由口宣福生有兆禍來有端情莫多妄口莫多言蟻孔潰河淄川傾山病從口入患自口出存亡之機開闢之術口與心謀安危之源樞機之發榮辱隨焉意林見虎一毛不見其斑道家笑儒者之拘儒者嗤道家之放皆不見本也意林傅子曰聖人之道如天地諸子之異如四時四時相反天地合而通焉意林夫五經則四海也傳記則四瀆也諸子則沍渭也至于百川溝洫畎澮苟能通陰陽之氣達水泉之流以四海為歸者皆溢也北堂書鈔藝文部太平御覽學部語曰能理亂絲乃可讀詩余雖無治絲之能而悟聞詩之義太平御覽學部藝文類聚雜文部魯恭王壞孔子舊宅得周書闕無冬官漢武購千金而莫有得者遂以考工記備其數太平御覽學部禮者履也律也義同而名異五禮者吉凶軍賓嘉也藝文類聚禮部太平御覽禮儀部禮云繼父服齊衰傅子曰母捨己父更嫁他人與己父絕甚于兩夫也又制服恐非周孔所制亡秦焚書以後俗儒造之意林論語聖人之至教王者之大化鄉黨篇則有朝廷之儀聘享之禮堯曰篇則有禪代之事意林楚漢之際有好事者作世本上錄黃帝下逮秦漢意林班固漢書因父得成遂沒不言彪殊異馬遷也意林吾觀班固漢書論國體則飾主闕而抑忠臣敘世教則貴取容而賤直節述時務則謹辭章而略事實非良史也意林夫文采之在人猶榮華之在草意林曄若春華之並發馥若秋蘭之俱茂意林平子二京文章卓然文選西京賦注夫虛無之談尚其華藻無異春鼃秋蟬聒耳而已太平御覽學部夫論事比類不得其體雖飾以華辭文以美言無異錦繡衣掘株管弦樂土梗非其趨也太平御覽布帛部夫解小而引大了淺而伸深猶以牛刀割雞長殳刈薺太平御覽菜茹部樹上懸瓠非木實也背上披裘非脊毛也此似而非意林經巨海者終年不見其涯測虞淵者終世不知其底故近者不可以度遠也意林九日養親一日餓之豈得言孝飽多飢少固非孝乎穀馬十日一日餓之馬肥不損于義無傷不可同之一日餓母也意林大孝養志其次養形養志者盡其和養形者不失其敬意林墨子兼愛是廢親也知喪是忘憂也意林傅子云孟軻孫卿若在孔門非唯游夏而己乃冉閔之徒也意林聞一善言見一善事行之唯恐不及聞一惡言見一惡事遠之唯恐不速意林懸千金于市市人不敢取者分定也委一錢于路童兒爭之者分未定也意林檢身止欲無過于蚓此志士所不及也太不御覽虫豸部范蠡字少伯楚三戶人也使越滅吳已後乘輕舟遊五湖王令人寫其狀恒朝禮之列仙傳云徐人也意林傅氏之先出自陶唐傳說之後玄字休奕子咸字長虞晉書有傳意林呂子義當世清賢士常往友人處嫌其設酒食懷乾糒而往主人榮其降乃盛為饌義出忙中乾糒求一杯冷水食之太平御覽人事部飲食部今有呂子義清賢士為率更令有人就之宿非其度數之內子義燃燭危坐通曉目不轉晴膝不移處太平御覽人事部呂義為太子率更令嚴毅清高北堂書鈔設官部漢末有管秋陽者與弟及伴一人避亂俱行天雨雪糧絕謂其弟曰今不食伴則三人俱死乃與弟共殺之得糧達舍後遇無罪此人可謂善士乎孔文舉曰管秋陽受先人之遺體食伴無嫌也荀侍中難曰管秋陽貪生殺生豈不罪邪文舉曰此伴非會友也若管仲啖鮑叔貢禹食王陽此則不可向所殺者特鳥獸而能言耳今有犬齧一狸狸齧一鸚䳇何足怪也昔重耳戀齊女而欲食狐偃叔敖怒楚師而欲食伍參賢哲之忿猶欲啖人而況遭窮者乎意林積薪若山縱火其下火未及燃一杯之水尚可滅也及至火猛風起雖傾河海不能救也秦昭王是積薪而縱火其下始皇燃而方熾二世風起而怒也意林秦人視山東之民猶猛虎之睨群羊何隔憚哉意林始皇遠遊並海而不免平臺之變及葬驪山尋見發掘今有鉛錫之鋌雖歐冶百鍊猶不如瓦刃有駑鈍之馬雖造父駕之終不及飛兔絕景質鈍故也士不可以作鐵而可以作瓦意林秦始皇起驪山之冢使蒙恬築長城死者相屬民歌曰生男慎勿舉生女哺用餔不見長城下尸骸相支柱其冤痛如此矣蒙恬臨死曰夫起臨洮屬遼東城塹萬餘里不能不絕地脈此固當死也水經注河水太平御覽樂部始皇塚令人作機弩有人穿者即射之以人魚膏作燭意林漢高祖度闊而網疏故後世推誠而𥳑直光武教一而網密故後世守常而禮義魏武糾亂以尚猛天下修法而貴理意林光武鳳翔于南陽燕雀化為鵷雛二漢之臣煥爛如三辰之附長天長平之卒磊落如秋草之中繁霜勢使然也意林傅子曰諸葛亮誠一時之異人也治國有分御軍有法積功興業事得其機入無遺刃出有餘糧知蜀本弱而危故持重以鎮之若姜維欲速立其功勇而無決也意林我欲戰而彼不欲戰者我鼓而進之若山崩河溢當其衝者摧值其鋒者破所謂疾雷不暇掩耳則又誰禦之意林吳起吮瘡者之膿積恩以感下也史記云吳起吮癰晝戰目相見夜戰耳相聞得利同勢失利相救意林漢末黃門張讓段珪等于靈帝幄後相對泣帝驚問尚復幾時哉于是大收諸黨太平御覽服用部黃巾被服純黃不將尺兵肩長衣翔行舒步所至郡縣無不從是日天大黃漢書五行志注世傳有夫死而婦許不嫁者誓以繡衣襚以衣尸納諸棺焉後三年婦出適迎有日矣有行道人夜求人家宿晨向主人語婦約之辭寄所誓之衣曰子到千里當逢之還此衣焉主者出門到所言處果見迎車具以事告還其繡衣婦遂自經而死太平御覽布帛部昔燕趙之間有三男共娶一女生四子後爭訟廷尉奏云禽獸生子逐父宜以子還母尸三男于市意林逐兔之犬終朝尋兔不失其迹雖見麋鹿不暇顧也意林夫醫者非仁愛不可託也非聰明理達不可任也非廉潔淳良不可信也是以古之用醫必選名姓之後其德能仁恕博愛其智能宣暢曲解能知天地神祗之次能明性命吉凶之數處虛實之分定逆順之節原疾疹之輕重而量藥劑之多少貫微達幽不失細微如是乃謂良醫且道家則尚冷以草木以冷生醫家則尚溫以血脈以煗通徒知其大趣不達其細理不知剛柔有輕重節氣有多少進退盈縮有節卻也名醫達脈者求之寸口三候之間則得之矣度節氣而候溫冷參脈理而合輕重量藥石皆相應此可謂名醫醫有名而不良者有無名而良者人主之用醫必參知而隱括之初學記政理部凡病可治也人不可治也體羸性弱不堪藥石或剛暴狷急喜怒不節或情慾放縱貪淫嗜食此皆良醫不能加功焉夫君子病也猶可為也必使無病也不可為矣蓋謂節其飲食量其多少也丸平御覽疾病部趙簡子有疾扁鵲診候出曰疾可治也而必殺醫焉以告太子太子保之扁鵲領召而入入而著履登床簡子大怒便以戟追殺之扁鵲知簡子大怒則氣通血脈暢達也太平御覽疾病部穀氣勝元氣其人肥而不壽元氣勝穀氣其人瘦而壽養性之術常使穀氣少則病不生矣粱者黍稷之揔名稻者溉種之總名菽者眾豆之揔名三穀各二十種為六十疏果之實助穀各二十凡為百穀故詩曰播厥百穀者穀種眾種之大名也初學記寶器部太平御覽穀部稼借耕也穡猶收也古今之言云爾稼農之本穡農之末農本輕而末重前緩而後急稼欲少穡欲多耨欲緩收欲速此良農之務太平御覽資產部凡種有強弱土有高柔土宜強高莖而疏粟長穗而大粒初學記寶器部忿飆焚衣其損多矣覆甑而棄之所害亦多矣意林太平御覽飲食部恐不知味而唾殘一切經音義三聽清濁五聲之和然後制為鍾律取宏農宜陽縣金門山竹為律管河內葭為灰可謂同氣藝文類聚歲時部太平御覽時序部琴欲高張瑟欲下聲文選頻廷年秋胡詩注化狐作舟初學記器物部若謂黃帝後方有舟楫庖犧之時長江大海何所用之意林鴻毛一羽在水而沒者無勢也黃金萬鈞在舟而浮者託舟之勢也意林夫工匠經涉河海為䑦𦪇以浮大淵皆成乎手出乎聖意北堂書鈔舟部藝文類聚舟車部太平御覽舟部指南車見周官亦見鬼谷子先生意林給事中與高堂隆秦朗爭指南車二子云古無此車記虛言耳先生曰爭虛空言不及如試之效也言于明帝明帝詔使作之車乃成意林翻車先生居在京師有地作園而患無水可溉乃作翻車令童兒轉之其功百倍意林金以利用錢以輕流此二物飢不可食意林世富錢流則禁盜鑄錢世貧錢滯則禁盜壞錢意林夫蜘蛛之羅網蜂之作巢其巧妙矣而況于人乎故工匠之方圓規矩出乎心巧成于手非睿敏精密孰能著勳形成器用哉太平御覽藝術部古有阮師之刀天下之所寶貴也初阮之作刀受法于金精之靈七月庚辛見金人于冶監之門其人光色煒燿向神再拜神執其手曰子可教也阮致之開宴設饌而門焉神教以水火之齊五精之陶用陰陽之候取剛柔之和行其術三年作刀千七日七十口而喪其明其刀平背狹刃方口洪首截輕微不絕絲髮之系斫堅剛無變動之異世不恡百金精求不可得也其次有蘇家刀雖不亦一時之利器也次有陽紀趙青間皆不能繼太平御覽兵部古有阮師之刀蘇家之楯皆為良工利器時所寶貴也夫刀者身之寶也楯者身之衛也禦難之藩牆守之城池也太平御覽兵部幽州之騎冀州之刀勁悍之士文選陽給事誄注天下之害莫害于女飾一頭之飾盈千金之價婢妾之服亦重四海之珍意林馬先生綾機先生名鈞字衡天下之名巧也綾機本五十縱五十𥷨六十縱六十𥷨先生乃易二𥷨奇文異變因感而作自成陰陽無窮也意林西國胡言蘇合香是獸便中獸便而臭忽聞西極獸便而香則不信矣意林
